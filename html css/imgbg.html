<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image as background</title>
    <style>
        .section{
            height: 900px;
            background-image: url(https://img.freepik.com/premium-photo/abstract-neon-lights-background-with-smoke-fog-grunge-texture_324689-575.jpg?semt=ais_user_personalization&w=740&q=80);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            color: aliceblue;
            text-align: center;
            padding: 120px;
        }
    </style>
</head>
<body>
    <div class="section">
        <h2>Setting Image as a background</h2>
    </div>
</body>
</html>
