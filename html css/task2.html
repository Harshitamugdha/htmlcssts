<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK</title>
    <style>
        header{
            background-color: orange;
            color: white;
            text-align: center;
        }
        footer{
            text-align: center;
            background-color: black;
            color: white;
            text-align: center;
            padding: 20px;
            margin: auto;
        }
        section{
            text-align: center;
            border: 1px solid black;
            padding: 10px;
        }
        .grid{
            display: grid;
            padding: 20px;
            margin:auto;
            align-items: center;
            justify-items: center;
            gap: 10px;
            grid-template-columns: repeat(3, 1fr);
        }
        .form{
            text-align: center;
            border: 1px solid black;
            padding: 10px;
            margin: auto;
            font-display: auto;
        }
        .link{
            color: rgb(42, 183, 215);
            margin: 10px;
        }
        .button{
            background-color: red;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1> ADMISSION 2026</h1>
    </header>
    <section>
        <div>
            <h2>ADMISSION OPEN</h2>
        </div>
    </section>
    <div class="grid">
    <img src="Img1.jpeg" alt="My photo" width="600" height="300">
    <img src="Img2.jpg" alt="My photo" width="600" height="300">
    <img src="img3.jpg" alt="My photo" width="600" height="300">
    <img src="img4.jpg" alt="My photo" width="600" height="300">
    <img src="img5.jpg" alt="My photo" width="600" height="300">
    <img src="img6.jpg" alt="My photo" width="600" height="300">

    </div>
    <div class="form">
        <form>
            <h2>Contact Form</h2>
            <label for="Name">Name:</label>
            <input type="text" id="Name" name="Name">
            <br><br>
            <label for="Email">Email:</label>
            <input type="email" id="Email" name="Email">
            <br><br>
            <label for="Number">Contact Number:</label>
            <input type="number" id="Number" name="Number">
            <br><br>
            <input class="button" type="submit" value="submit">
        </form>
    </div>
    <footer class="header">
        <h1>Lovely Professional University</h1>
        <p>Contact Us</p> 
        <a href="https://www.instagram.com/lpuuniversity/?hl=en" class="link">Instagram</a>
        <a href="https://www.facebook.com/lpuuniversity" class="link">Facebook</a>
        <a href="https://www.linkedin.com/school/lovely-professional-university/" class="link">LinkedIn</a>
    </footer>
</body>
</html>
