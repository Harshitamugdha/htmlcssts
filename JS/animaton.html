<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 150px;
            height: 150px;
            background-color: antiquewhite;
            animation: changecolor 3s ;
        }
        @keyframes changecolor{
            from{
                background-color: antiquewhite;
            }
            to{
                background-color: pink;
            }
        }
    </style>
</head>
<body>
    <div class="card">
    </div>
</body>
</html>
