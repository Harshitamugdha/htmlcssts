<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> For Loop</title>
</head>
<body>
    <script>
        // for(let i=0;i<5;i++){
        //     console.log(i);
        // }
        let i=1;
        while(i<=5){
            console.log(i);
            i++;
        }

        let j=1;
        do{
            console.log("Value: ",j);
            j++;
        }
        while(j<=5);

        let n=5;
        for(let k=1;k<=10;k++){
            console.log(n," * ",k," = ", n*k);
        }
    </script>
</body>
</html>
