<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #efc0d0cd;
        background: linear-gradient(180deg, #efc0d0cd, #ec9eb8cd, #ed81a5cd);
    }
    .box{
        width: 150px;
        height: 150px;
        background: black;
        border-radius: 5px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
        font-family: Arial, Helvetica, sans-serif;
        transition: transform 0.5s, box-shadow 0.5s, font-family 0.5s;
    }
    .box:hover{
        transform: scale(1.5);
        box-shadow: 0 15px 20px rgb(130, 127, 127);
        font-family: cursive;

    }
</style>
<body>
    <div class="box">Hover Me</div>
</body>
</html>
