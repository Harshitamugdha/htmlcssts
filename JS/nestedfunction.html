    function attendance(studentName){
        var totalLectures = 40;
        var attendedLectures = 10;
        var threshold = 22;

        function calculate(){
            var percentage = (attendedLectures / totalLectures) * 100;
            console.log(studentName + " Attendance Percentage: " + percentage + "%");
        }

        function check(){
            if(attendedLectures >= threshold){
                console.log(studentName + " is Eligible for Exam");
            }
            else{
                console.log(studentName + " is Not Eligible for Exam");
            }
        }

        calculate();
        check();
    }

    attendance("Harshita");
