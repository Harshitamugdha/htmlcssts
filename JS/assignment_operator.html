<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=10,b=2;
        console.log("a + b = ", a + b);
        console.log("a - b = ",a-b);
        console.log("a * b = ",a*b);
        console.log("a % b = ",a%b);
        console.log("a / b = ",a/b);
        let x=4;
        x+=3;
        console.log("x after x+3 is ", x);
        x-=2;
        console.log("x after -2 is ",x);
        x*=4;
        console.log("x after *4 is ",x);
        x/=6;
        console.log("x after /6 is ",x);
    </script>
</body>
</html>
