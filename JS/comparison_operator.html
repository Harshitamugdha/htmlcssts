<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let m=10,n="10";
        console.log("m == n : ", m==n); //it will compare only value (auto type conversion)
        console.log("m === n : ", m===n); //it wil compare data type also
        console.log("m != n : ", m!=n); //it will compare only value
        console.log("m !== n : ", m!==n); //it will compare data type also
        console.log(m>5);
        console.log(n<15);
        console.log(m>=10); 
        console.log(n<=10);
    </script>
</body>
</html>
