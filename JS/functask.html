<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
            margin: 5px;
        }
        button{
            margin: 5px;
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
   <script>
        function eleventh(){
            num1=Number(document.getElementById("num1").value);
            num2=Number(document.getElementById("num2").value);
            percentage=num1/num2*100;   
            document.getElementById("result1").innerText="The percentage is: "+percentage+"%";
        }
        function twelfth(){
            num3=Number(document.getElementById("num3").value);
            num4=Number(document.getElementById("num4").value);
            percentage=num3/num4*100;
            document.getElementById("result2").innerText="The percentage is: "+percentage+"%";
        }
    </script>
    <h1>11TH Percentage Calculator</h1>
    <input type="text" id="num1" placeholder="Enter first number">
    <input type="text" id="num2" placeholder="Enter second number">
    <button onclick="eleventh()">Calculate</button>
    <p id="result1"></p>
    <h1>12TH Percentage Calculator</h1>
    <input type="text" id="num3" placeholder="Enter first number">
    <input type="text" id="num4" placeholder="Enter second number">
    <button onclick="twelfth()">Calculate</button>
    <p id="result2"></p>

</body>
</html>
