<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 150px;
            height: 150px;
            background-color: aqua;
            position: relative;
            animation: movebox 3s;
        }
        @keyframes movebox{
            0%{left: 0px;}
            100%{left: 800px;}
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
