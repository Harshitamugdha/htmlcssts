<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p class="one">First Para</p>  <!--Index 0-->
    <p class="one">Second Para</p>  <!--Index 1-->
    <!-- id is supposed to be unique for eavh element but class can be shared by multiple elements -->
     <button onclick="changeClass()">Click</button>
     <script>
        function changeClass(){
            let items=document.getElementsByClassName("one");
            items[0].style.color="red";
             items[1].style.color="blue";
        }
     </script>
</body>
</html>
