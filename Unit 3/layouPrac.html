<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*Element Selector*/
        body{
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            background: whitesmoke;
        }
        .navbar{
            background-color: rgb(13, 26, 99);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container{
            display: flex;
        }
        .sidebar{
            background: #1A2CA3;
            width: 200px;
            color: white;
            height: auto;
        }
        .sidebar ul{
            list-style: none;
            padding: 0;
        }
        .sidebar li{
            padding: 15px;
            border-bottom: 1px solid gray;
            cursor: pointer;
        }
        .sidebar li:hover{
            background-color: gray;
        }
        .content{
            flex: 1;
            padding: 20px;
            text-align: center;
        }
        .cards{
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .card{
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: gray;
            width: 350px;
        }
        .card img{
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        button{
            padding: 8px 12px;
            background-color: rgb(80, 80, 247);
            color: white;
            border: none;
            margin-top: 10px;

        }
        .form{
            margin-top: 40px;
            background-color: white;
            padding: 25px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: gray 0 0 10px;
        }
        input{
            margin-top: 10px;
            padding: 8px;
            width: 90%;
        }
        .dark .card{
            background-color: rgb(52, 51, 51);
            color: white;
        }
        .dark .form{
            background-color: rgb(52, 51, 51);
            color: white;
        }
        .dark .navbar{
            background-color: rgb(52, 51, 51);
            color: white;
        }
    </style>
    <script>
        function showCourse(course){
            alert("Opening Course: "+course);
        }

        function sendMessage(){
            let name=document.getElementById("name").value;
            let msg=document.getElementById("msg").value;
            document.getElementById("result").innerText="Message sent by "+name+": "+msg;
        }
        function toggleMode(){
            document.body.classList.toggle("dark");
        }
        function showMarks(){
            let marks=document.getElementById("marks").value;
            let m=marks/30*50;
            document.getElementById("mark").innerText="Weightage of CA1 marks is "+m;
        }
    </script>
</head>
<body>
    <!-- Navbar -->

    <header class="navbar">
        <h2>Student Dashboard</h2>
        <button onclick="toggleMode()">Dark Mode</button>
    </header>
    <div class="container">
        <!-- Sidebar -->
         <aside class="sidebar">
            <ul>
                <li>HOME</li>
                <li>COURSES</li>
                <li>ASSIGNMENTS</li>
                <li>PROFILE</li>
            </ul>
         </aside>
         
         <!--Main Content-->
         <main class="content">
            <h2>Welcome Student</h2>
            <div class="cards">
                <div class="card">
                    <img src="https://www.fita.in/wp-content/uploads/2023/07/Front-End-Development-Frameworks.jpg" >
                    <h3>Front End Web Development</h3>
                    <p>This is Web Development</p>
                    <button onclick="showCourse('Web Technology')">View</button>
                    <div class="ca">
                        <h3>Result of Current Sem</h3>
                        <input type=" text" id="marks" placeholder="Enter CA1 marks">
                        <p id="mark"></p>
                        <button onclick="showMarks()">SHOW</button>
                    </div>
                </div>
                <div class="card">
                    <img src="https://www.differenzsystem.com/images/back-end-development/web-development.webp" >
                    <h3>Advance Web Development</h3>
                    <p>This is backend subject</p>
                    <button onclick="showCourse('Node 222')">View</button>
                    <input type=" text" id="marks" placeholder="Enter CA1 marks">
                        <p id="mark"></p>
                        <button onclick="showMarks()">SHOW</button>
                </div>
                <div class="card">
                    <img src="https://cdn.hashnode.com/res/hashnode/image/upload/v1675180430218/c3cc52ca-23e7-4373-8b8e-97355d07ece4.jpeg" >
                    <h3>JAVA Programming language</h3>
                    <p>This is a programming language</p>
                    <button onclick="showCourse('Java Programming')">View</button>
                    <input type=" text" id="marks" placeholder="Enter CA1 marks">
                        <p id="mark"></p>
                        <button onclick="showMarks()">SHOW</button>
                </div>
            </div>
            <!-- Contact Form-->
             <div class="form">
                <h3>Contact Teacher</h3>
                <input type="text" id="name" placeholder="Enter Name">
                <input type="text" id="msg" placeholder="Enter Message">
                <button onclick="sendMessage()">SEND</button>
                <p id="result"></p>
             </div>
         </main>
    </div>
</body>
</html>
