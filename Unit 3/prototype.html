<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Prototype</h1>
    <p id="one"></p>
    <script>
        function Car(name){
            this.name=name
        }
        //call method using prototype
        Car.prototype.start=function(){
            return this.name+" is starting"; 
        }
        //create object
        let c1=new Car("BMW");

        //USE METHOD
        document.getElementById("one").innerHTML=c1.start();
    </script>
</body>
</html>
